volumes:
  civicvoice_backend_local_postgres_data: {}
  civicvoice_backend_local_postgres_data_backups: {}
  civicvoice_backend_local_pgadmin: {}
  civicvoice_backend_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: civicvoice_backend_local_django
    container_name: civicvoice_backend_local_django
    depends_on:
      - postgres
      - redis
      - mailhog
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start
  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: civicvoice_backend_production_postgres
    container_name: civicvoice_backend_local_postgres
    ports:
      - '5433:5432'
    volumes:
      - civicvoice_backend_local_postgres_data:/var/lib/postgresql/data
      - civicvoice_backend_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  pgadmin:
    image: dpage/pgadmin4
    container_name: civicvoice_backend_local_pgadmin
    env_file:
      - ./.envs/.local/.postgres
    volumes:
      - civicvoice_backend_local_pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres
    ports:
      - '5050:80'
  mailhog:
    image: mailhog/mailhog:v1.0.0
    container_name: civicvoice_backend_local_mailhog
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:6
    container_name: civicvoice_backend_local_redis
    
    volumes:
      - civicvoice_backend_local_redis_data:/data
    

  celeryworker:
    <<: *django
    image: civicvoice_backend_local_celeryworker
    container_name: civicvoice_backend_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailhog
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: civicvoice_backend_local_celerybeat
    container_name: civicvoice_backend_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailhog
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: civicvoice_backend_local_flower
    container_name: civicvoice_backend_local_flower
    ports:
      - '5555:5555'
    command: /start-flower